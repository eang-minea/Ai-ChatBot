<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Ai ChatBot By Eang Minea </title>

    <!-- linking Google fonts for icon -->
     <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="chatbot-popup">
        <!-- ChatBot Header -->
        <div class="chat-header">
            <div class="header-info">
                <svg class="chatbot-logp" width="64px" height="64px" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="#000000">
                    <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                    <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                    <g id="SVGRepo_iconCarrier">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M8.48 4h4l.5.5v2.03h.52l.5.5V8l-.5.5h-.52v3l-.5.5H9.36l-2.5 2.76L6 14.4V12H3.5l-.5-.64V8.5h-.5L2 8v-.97l.5-.5H3V4.36L3.53 
                            4h4V2.86A1 1 0 0 1 7 2a1 1 0 0 1 2 0 1 1 0 0 1-.52.83V4zM12 8V5H4v5.86l2.5.14H7v2.19l1.8-2.04.35-.15H12V8zm-2.12.51a2.71 2.71 
                            0 0 1-1.37.74v-.01a2.71 2.71 0 0 1-2.42-.74l-.7.71c.34.34.745.608 1.19.79.45.188.932.286 1.42.29a3.7 3.7 0 0 0 2.58-1.07l-.7-.71zM6.49
                            6.5h-1v1h1v-1zm3 0h1v1h-1v-1z">
                        </path>
                    </g>
                </svg>
                <h2 class="logo-text">Chat Bot</h2>
            </div>
            <button id = "close-chatbot" class="material-symbols-rounded">
                keyboard_arrow_down
            </button>
        </div>

        <!-- ChatBot Body -->
        <div class="chat-body">
            <div class="message bot-message">
                <svg width="64px" height="64px" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="#000000">
                    <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                    <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                    <g id="SVGRepo_iconCarrier">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M8.48 4h4l.5.5v2.03h.52l.5.5V8l-.5.5h-.52v3l-.5.5H9.36l-2.5 2.76L6 14.4V12H3.5l-.5-.64V8.5h-.5L2 8v-.97l.5-.5H3V4.36L3.53 
                            4h4V2.86A1 1 0 0 1 7 2a1 1 0 0 1 2 0 1 1 0 0 1-.52.83V4zM12 8V5H4v5.86l2.5.14H7v2.19l1.8-2.04.35-.15H12V8zm-2.12.51a2.71 2.71 
                            0 0 1-1.37.74v-.01a2.71 2.71 0 0 1-2.42-.74l-.7.71c.34.34.745.608 1.19.79.45.188.932.286 1.42.29a3.7 3.7 0 0 0 2.58-1.07l-.7-.71zM6.49
                            6.5h-1v1h1v-1zm3 0h1v1h-1v-1z">
                        </path>
                    </g>
                </svg>
                <div class="message-text"> Hello I'm there 👋🏻 <br />How Can I Help you today??</div>
            </div>

            <div class="chat-body">
                <div class="message user-message">
                    <div class="message-text">Lorem ipsum dolor sit amet consectetur adipisicing elit. Commodi, dolores.
                    </div>
                </div>
            </div>
        </div>

        <!-- ChatBot footer -->
        <div class="chat-footer">
    <form action="#" class="chat-from">
        <textarea placeholder="Message..." class="message-input"></textarea>

        <div class="chat-controls">
            <button type="button" class="material-symbols-rounded">sentiment_satisfied</button>
            <button type="button" class="material-symbols-rounded">attach_file</button>
            <button type="submit" class="material-symbols-rounded">arrow_upward</button>
        </div>
    </form>
</div>
    </div>
</body>

</html>
